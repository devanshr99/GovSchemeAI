name: GovSchemeAI Production Deployment CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: 'Image tag to rollback to'
        required: false
        default: ''

jobs:
  # ============================================================================
  # 1. Automated Quality & Security Audit
  # ============================================================================
  test_and_scan:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # --- Backend Quality & Security ---
      - name: Setup Python Runtime
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest httpx pytest-asyncio bandit

      - name: Run Backend Security Scan (Bandit)
        run: bandit -r backend/app -x backend/app/tests

      - name: Run Backend Unit & Integration Tests
        run: |
          cd backend
          python -m pytest

      # --- Frontend Quality & Security ---
      - name: Setup Node.js Runtime
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Security Audit
        run: |
          cd frontend
          npm audit --audit-level=high

      - name: Build Frontend Application
        run: |
          cd frontend
          npm run build


