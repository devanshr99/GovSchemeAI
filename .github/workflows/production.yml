name: GovSchemeAI Production Deployment CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: 'Image tag to rollback to'
        required: false
        default: ''

jobs:
  # ============================================================================
  # 1. Automated Quality & Security Audit
  # ============================================================================
  test_and_scan:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # --- Backend Quality & Security ---
      - name: Setup Python Runtime
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest httpx pytest-asyncio bandit

      - name: Run Backend Security Scan (Bandit)
        run: bandit -r backend/app -x backend/app/tests

      - name: Run Backend Unit & Integration Tests
        run: |
          cd backend
          python -m pytest

      # --- Frontend Quality & Security ---
      - name: Setup Node.js Runtime
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Security Audit
        run: |
          cd frontend
          npm audit --audit-level=high

      - name: Build Frontend Application
        run: |
          cd frontend
          npm run build

  # ============================================================================
  # 2. Build & Push Production Docker Images
  # ============================================================================
  build_and_push:
    name: Build & Push Docker Images
    needs: test_and_scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build & Push Backend ---
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Build and Push Frontend ---
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # 3. Continuous Deployment & Rollback Handler
  # ============================================================================
  deploy_or_rollback:
    name: Production Deployment / Rollback
    needs: build_and_push
    runs-on: ubuntu-latest
    if: always() && (needs.build_and_push.result == 'success' || github.event.inputs.rollback_tag != '')
    steps:
      # Action to determine whether we are performing regular deployment or a user rollback
      - name: Set Release/Rollback Target
        id: vars
        run: |
          if [ "${{ github.event.inputs.rollback_tag }}" != "" ]; then
            echo "ACTION=rollback" >> $GITHUB_OUTPUT
            echo "TAG=${{ github.event.inputs.rollback_tag }}" >> $GITHUB_OUTPUT
          else
            echo "ACTION=deploy" >> $GITHUB_OUTPUT
            echo "TAG=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Execute Deployment / Rollback on VPS via SSH
        if: steps.vars.outputs.ACTION == 'deploy' || steps.vars.outputs.ACTION == 'rollback'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            cd /app/govscheme-ai
            export IMAGE_TAG=${{ steps.vars.outputs.TAG }}
            # Update running containers
            docker compose pull backend frontend worker scheduler
            docker compose up -d --remove-orphans
            
            # Post-deployment health validation checks
            echo "Verifying service health..."
            sleep 10
            curl --fail http://localhost:8000/api/health/ready || (echo "Health probe failed! Reverting." && exit 1)
